name: Import Bitcoin Addresses from Artifact to SQLite & Upload to R2

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (AWS CLI is pre-installed)
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ sqlite3 libsqlite3-dev unzip gzip

      - name: Download artifact from GitHub
        run: |
          curl -L -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/sinescode/bitadressa/actions/artifacts/5907316265/zip" \
            -o artifact.zip
          # Verify it's a real zip (size > 1MB)
          if [ $(stat -c%s artifact.zip) -lt 1000000 ]; then
            echo "Downloaded file is too small – check your token or artifact ID"
            exit 1
          fi

      - name: Extract outer zip → inner zip
        run: |
          unzip -j artifact.zip -d step1
          # Expecting "blockchair-bitcoin-addresses.zip"
          if [ ! -f step1/blockchair-bitcoin-addresses.zip ]; then
            echo "Inner zip not found; contents:"
            ls -la step1
            exit 1
          fi
          mv step1/blockchair-bitcoin-addresses.zip inner.zip

      - name: Extract inner zip → .gz
        run: |
          unzip -j inner.zip -d step2
          if [ ! -f step2/blockchair_bitcoin_addresses_latest.tsv.gz ]; then
            echo "GZ file not found; contents:"
            ls -la step2
            exit 1
          fi
          mv step2/blockchair_bitcoin_addresses_latest.tsv.gz input.tsv.gz

      - name: Decompress .gz → .tsv
        run: gunzip -v input.tsv.gz

      - name: Compile importer
        run: g++ -O2 -std=c++20 tsv_to_sqlite.cpp -lsqlite3 -o tsv_to_sqlite

      - name: Run importer
        run: ./tsv_to_sqlite input.tsv addresses.db

      - name: Configure AWS CLI for R2
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set region auto

      - name: Upload database to R2 with timestamp
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          aws s3 --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            cp addresses.db s3://sqlitedatabase/addresses_${TIMESTAMP}.db